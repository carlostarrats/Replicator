name: Vercel Config Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VCOPY_AUDIT_PROJECTS: ${{ vars.VCOPY_AUDIT_PROJECTS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Vercel config overview
        run: |
          if [ -n "$VCOPY_AUDIT_PROJECTS" ]; then
            node src/cli.mjs overview --projects "$VCOPY_AUDIT_PROJECTS" --fail-on-drift --out vercel-config-overview.md
          else
            node src/cli.mjs overview --fail-on-drift --out vercel-config-overview.md
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vercel-config-overview
          path: vercel-config-overview.md

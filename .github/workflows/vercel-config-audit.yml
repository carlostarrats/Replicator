name: Vercel Config Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VCOPY_ENABLE_CLOUD_AUDIT: ${{ vars.VCOPY_ENABLE_CLOUD_AUDIT }}
      VCOPY_AUDIT_PROJECTS: ${{ vars.VCOPY_AUDIT_PROJECTS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Vercel config overview
        run: |
          if [ "$VCOPY_ENABLE_CLOUD_AUDIT" != "true" ]; then
            echo "VCOPY_ENABLE_CLOUD_AUDIT must be true for manual cloud audits."
            exit 1
          fi
          if [ -z "$VCOPY_AUDIT_PROJECTS" ]; then
            echo "VCOPY_AUDIT_PROJECTS is required for manual cloud audits."
            exit 1
          fi
          node src/cli.mjs overview --projects "$VCOPY_AUDIT_PROJECTS" --fail-on-drift --out vercel-config-overview.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vercel-config-overview
          path: vercel-config-overview.md
